<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="22" fill="#1a1a2e"/>
  <!-- Speech bubble left -->
  <rect x="10" y="20" width="45" height="32" rx="8" fill="#e8ff6e"/>
  <polygon points="18,52 10,64 30,52" fill="#e8ff6e"/>
  <!-- Speech bubble right -->
  <rect x="45" y="44" width="45" height="32" rx="8" fill="#6ee8ff"/>
  <polygon points="82,76 90,88 70,76" fill="#6ee8ff"/>
  <!-- Text lines in left bubble -->
  <rect x="16" y="28" width="26" height="4" rx="2" fill="#0f0f1a" opacity="0.6"/>
  <rect x="16" y="36" width="20" height="4" rx="2" fill="#0f0f1a" opacity="0.4"/>
  <!-- Text lines in right bubble -->
  <rect x="51" y="52" width="26" height="4" rx="2" fill="#0f0f1a" opacity="0.6"/>
  <rect x="51" y="60" width="18" height="4" rx="2" fill="#0f0f1a" opacity="0.4"/>
</svg>
